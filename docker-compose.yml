version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./appsettings.json:/app/appsettings.json
    ports:
      - "3000:3000"
    restart: always

  frontend:
    build:
      context: ./frontend_Personal
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - backend
