version: "3.8"

services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - app_network
    restart: always

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_tracking
    environment:
      - ConnectionStrings__DefaultConnection=Server=34.92.198.251;Database=PersonalTrackingDB;User
        Id=sqlserver;Password=${SQL_PASSWORD};TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - app_network
    restart: always

  frontend:
    build:
      context: ./frontend_Personal
      dockerfile: Dockerfile
      args:
        # เปลี่ยนเป็น IP ของคุณ
        - VITE_API_URL=${API_URL}
    container_name: frontend_tracking
    volumes:
      - ./certbot/conf:/etc/letsencrypt
    networks:
      - app_network
    restart: always

networks:
  app_network:
    driver: bridge
