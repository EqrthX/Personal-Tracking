version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    restart: always

  frontend:
    build:
      context: ./frontend_Personal
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${API_URL}
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - backend
