server {
    listen 80;
    server_name 35.221.184.206.nip.io;

    # เส้นทางให้ Certbot เข้ามายืนยันตัวตน
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # บังคับย้าย HTTP ไปเป็น HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# ⚠️ สำคัญมาก: ตอนรันครั้งแรก (ยังไม่มี Certificate) 
# ให้ใส่เครื่องหมาย # ปิดโค้ดตั้งแต่บรรทัดนี้ลงไปจนสุดไฟล์ก่อน!
# พอรัน Certbot ผ่านแล้ว ค่อยเอา # ออก
# ==========================================

server {
    listen 443 ssl;
    server_name 35.221.184.206.nip.io;

    # ตำแหน่งไฟล์ SSL ที่ Certbot จะสร้างให้
    ssl_certificate /etc/letsencrypt/live/35.221.184.206.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/35.221.184.206.nip.io/privkey.pem;

    # 1. ส่งคำขอไปที่ Frontend (React)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. ส่งคำขอไปที่ Backend (C# API)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}